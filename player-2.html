<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Player</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html, body { margin: 0; padding: 0; background: #000; height: 100%; }

    .video-wrapper {
      position: relative;
      width: 100%;
      height: 100vh;
      background: #000;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    video { width: 100%; height: 100%; object-fit: cover; background: #000; }

    .progress-wrap {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 15px;
      background: rgba(0,0,0,0.65);
      border-top: 1px solid rgba(255,255,255,0.15);
      z-index: 9999;
      pointer-events: none;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: #FB7185;
      transition: width 0.12s linear;
    }

    .unmute-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.35);
      z-index: 10;
    }
    .unmute-overlay.hidden { display: none; }

    .unmute-button {
      background: #ffc800;
      color: #000;
      border-radius: 14px;
      padding: 18px 32px;
      font-family: Arial, sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      text-align: center;
      cursor: pointer;
      border: 2px solid #000;
      display: inline-flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
      justify-content: center;
      animation: pulse 1.2s infinite;
      box-shadow: 0 10px 24px rgba(0,0,0,0.45);
    }
    .unmute-icon  { font-size: 34px; margin-bottom: 4px; }
    .unmute-line-1 { font-size: 15px; letter-spacing: 0.5px; }
    .unmute-line-2 { font-size: 14px; }

    @keyframes pulse {
      0%   { transform: scale(1);    box-shadow: 0 0 0 0    rgba(255,200,0,0.7); }
      70%  { transform: scale(1.05); box-shadow: 0 0 0 16px rgba(255,200,0,0);   }
      100% { transform: scale(1);    box-shadow: 0 0 0 0    rgba(255,200,0,0);   }
    }
  </style>
</head>
<body>

<div class="video-wrapper">
  <video id="video" autoplay muted playsinline></video>

  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="unmute-overlay" id="unmuteOverlay">
    <div class="unmute-button">
      <div class="unmute-icon">🔇</div>
      <span class="unmute-line-1">SEU VÍDEO JÁ COMEÇOU!</span>
      <span class="unmute-line-2">CLIQUE PARA OUVIR!</span>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
  const video       = document.getElementById('video');
  const overlay     = document.getElementById('unmuteOverlay');
  const progressBar = document.getElementById('progressBar');

  // Pega ?src= da URL
  const params = new URLSearchParams(window.location.search);
  const SRC    = params.get('src');

  if (!SRC) {
    overlay.querySelector('.unmute-icon').textContent  = '⚠️';
    overlay.querySelector('.unmute-line-1').textContent = 'NENHUM VÍDEO INFORMADO';
    overlay.querySelector('.unmute-line-2').textContent = 'Adicione ?src=URL_DO_VIDEO';
  } else {
    if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(SRC);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => { updateFakeThreshold(); startProgressLoop(); });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = SRC;
    }

    video.muted = true;
    video.play().catch(() => {});
    video.addEventListener('loadedmetadata', () => { updateFakeThreshold(); startProgressLoop(); });
  }

  // --- Barra fake ---
  let THRESH = 0.8;

  function updateFakeThreshold() {
    const dur = video.duration;
    if (!dur || !isFinite(dur) || dur <= 0) return;
    let fakeDur;
    if (dur <= 120)      fakeDur = dur;
    else if (dur <= 300) fakeDur = 120;
    else                 fakeDur = dur * 0.40;
    THRESH = Math.min(Math.max(fakeDur / dur, 0.2), 0.9);
  }

  function fakeProgress(real) {
    if (real <= 0) return 0;
    if (THRESH >= 0.999) return real;
    const TARGET = 0.97;
    if (real < THRESH) return (real / THRESH) * TARGET;
    return TARGET + ((real - THRESH) / (1 - THRESH)) * (1 - TARGET);
  }

  let rafId = null;
  function startProgressLoop() {
    if (rafId) cancelAnimationFrame(rafId);
    const tick = () => {
      const dur = video.duration, cur = video.currentTime;
      if (dur && isFinite(dur) && dur > 0)
        progressBar.style.width = (fakeProgress(Math.min(cur / dur, 1)) * 100).toFixed(3) + '%';
      rafId = requestAnimationFrame(tick);
    };
    rafId = requestAnimationFrame(tick);
  }

  // --- Unmute ao clicar ---
  function restartAndUnmute() {
    try { video.pause(); video.currentTime = 0; } catch(e) {}
    progressBar.style.width = '0%';
    video.muted = false;
    video.volume = 1;
    video.play().catch(() => {});
    overlay.classList.add('hidden');
    updateFakeThreshold();
  }

  overlay.addEventListener('click', () => {
    if (video.readyState >= 1) {
      restartAndUnmute();
    } else {
      video.addEventListener('loadedmetadata', function onLoaded() {
        video.removeEventListener('loadedmetadata', onLoaded);
        restartAndUnmute();
      });
    }
  });
</script>
</body>
</html>
